<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>edit-md loading</title>
    <style>
      :root {
        color-scheme: dark;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        width: 100%;
        height: 100%;
        font-family: 'Segoe UI', Arial, sans-serif;
        background: radial-gradient(circle at top, #1e293b, #0f172a);
        color: #f8fafc;
      }

      body {
        display: grid;
        place-items: center;
      }

      .card {
        width: min(440px, calc(100vw - 24px));
        padding: 22px 24px;
        border-radius: 14px;
        border: 1px solid rgba(148, 163, 184, 0.28);
        background: rgba(15, 23, 42, 0.78);
        box-shadow: 0 18px 44px rgba(0, 0, 0, 0.32);
      }

      .brand {
        display: inline-flex;
        align-items: center;
        gap: 10px;
        margin-bottom: 12px;
        font-size: 18px;
        font-weight: 700;
      }

      .logo {
        display: grid;
        place-items: center;
        width: 34px;
        height: 34px;
        border-radius: 10px;
        background: linear-gradient(135deg, #f59e0b, #fb7185);
        color: #111827;
        font-size: 13px;
        font-weight: 800;
      }

      .desc {
        margin: 0;
        color: #cbd5e1;
        font-size: 13px;
        line-height: 1.6;
      }

      .bar {
        margin-top: 16px;
        height: 6px;
        border-radius: 999px;
        overflow: hidden;
        background: rgba(148, 163, 184, 0.2);
      }

      .bar::after {
        content: '';
        display: block;
        width: 36%;
        height: 100%;
        border-radius: inherit;
        background: linear-gradient(90deg, #f59e0b, #fcd34d);
        animation: loading 1.1s ease-in-out infinite alternate;
      }

      @keyframes loading {
        from {
          transform: translateX(-14%);
        }
        to {
          transform: translateX(190%);
        }
      }
    </style>
  </head>
  <body>
    <main class="card" aria-label="앱 로딩 화면">
      <div class="brand">
        <div class="logo">md</div>
        <div>마크다운 편집기</div>
      </div>
      <p class="desc">앱을 준비하고 있습니다. 잠시만 기다려 주세요...</p>
      <div class="bar" aria-hidden="true"></div>
    </main>
  </body>
</html>
